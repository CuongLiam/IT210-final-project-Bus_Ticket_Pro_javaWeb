<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết vé</title>

    <style>
        table {
            border-collapse: collapse;
            width: 600px;
        }

        td {
            border: 1px solid #333;
            padding: 8px;
        }

        td:first-child {
            font-weight: bold;
            width: 200px;
        }

        .status-pending {
            color: orange;
            font-weight: bold;
        }

        .status-paid {
            color: green;
            font-weight: bold;
        }

        .status-cancelled {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Chi tiết vé</h1>

<table>
    <tr>
        <td>Mã vé</td>
        <td th:text="${ticket.ticketCode}"></td>
    </tr>

    <tr>
        <td>Họ tên khách</td>
        <td th:text="${ticket.customerName}"></td>
    </tr>

    <tr>
        <td>Số điện thoại</td>
        <td th:text="${ticket.phone}"></td>
    </tr>

    <tr>
        <td>Email</td>
        <td th:text="${ticket.email}"></td>
    </tr>

    <tr>
        <td>Tuyến đường</td>
        <td>
            <span th:text="${ticket.fromLocation}"></span>
            →
            <span th:text="${ticket.toLocation}"></span>
        </td>
    </tr>

    <tr>
        <td>Giờ khởi hành</td>
        <td th:text="${#temporals.format(ticket.departureTime, 'dd/MM/yyyy HH:mm')}"></td>
    </tr>

    <tr>
        <td>Biển số xe</td>
        <td th:text="${ticket.plateNumber}"></td>
    </tr>

    <tr>
        <td>Loại xe</td>
        <td th:text="${ticket.busType}"></td>
    </tr>

    <tr>
        <td>Tài xế</td>
        <td th:text="${ticket.driverName}"></td>
    </tr>

    <tr>
        <td>Ghế</td>
        <td th:text="${ticket.seatNumber}"></td>
    </tr>

    <tr>
        <td>Giá vé</td>
        <td th:text="${#numbers.formatDecimal(ticket.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
    </tr>

    <tr>
        <td>Trạng thái vé</td>
        <td>
            <span th:if="${ticket.status.name() == 'PENDING'}"
                  class="status-pending">
                Chờ thanh toán
            </span>

            <span th:if="${ticket.status.name() == 'PAID'}"
                  class="status-paid">
                Đã thanh toán
            </span>

            <span th:if="${ticket.status.name() == 'CANCELLED'}"
                  class="status-cancelled">
                Đã hủy
            </span>
        </td>
    </tr>
</table>

<p>
    <a th:href="@{/passenger/tickets/lookup}">Tra cứu vé khác</a>
</p>

<p>
    <a th:href="@{/passenger/home}">Về trang hành khách</a>
</p>

</body>
</html>
